[template]
name = "taskflow-bastion"
description = "Continuous coordinator: picks milestones via taskflow next, spawns Splinters, merges worktrees, loops until the roadmap is exhausted."
kind = "bastion"
version = "2"
tags = ["taskflow", "coordinator"]

[agent]
role = "bastion"
cli_provider = "claude-code"
model = "claude-opus-4-7"
auto_cleanup = false
fallback_cascade = ["gemini-cli"]

[agent.sandbox]
network = "outbound_only"

[variables]
required = ["project_root"]
optional = ["bastion_agent_id"]
