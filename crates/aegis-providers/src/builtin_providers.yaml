providers:
  claude-code:
    binary: "claude"
    auto_approve_flags: ["--dangerously-skip-permissions", "--permission-mode", "bypassPermissions"]
    startup_delay_ms: 8000
    resume_mechanism: "cli_flag"
    resume_flag: "--resume"
    export_command: "/export"
    model_flag: "--model"
    interaction_model:
      type: "injected_tui"
    system_prompt_mechanism:
      type: "flag"
      arg: "--append-system-prompt-file"
    error_patterns:
      rate_limit: ["rate limit", "re:\\b429\\b", "usage limit reached", "hit your limit", "apierror: 529", "Stop and wait for limit to reset"]
      auth: ["401", "authentication failed"]

  gemini-cli:
    binary: "gemini"
    auto_approve_flags: ["--yolo"]
    startup_delay_ms: 8000
    interactive_flag: "-i"
    initial_prompt_arg: null
    resume_mechanism: "injection"
    resume_command: "/resume {session_id}"
    export_command: "/checkpoint save aegis-handoff"
    model_flag: "--model"
    interaction_model:
      type: "injected_tui"
    system_prompt_mechanism:
      type: "env"
      var: "GEMINI_SYSTEM_MD"
    error_patterns:
      rate_limit: ["quota exceeded", "usage limit reached", "re:\\b429\\b"]
      auth: ["401", "permission denied"]

  codex:
    binary: "codex"
    auto_approve_flags: ["--full-auto", "--no-alt-screen"]
    resume_mechanism: "subcommand"
    resume_command: "resume {session_id}"
    export_command: null
    model_flag: "--model"
    interaction_model:
      type: "headless_iterative"
    system_prompt_mechanism:
      type: "none"
    error_patterns:
      rate_limit: ["rate limit", "re:\\b429\\b", "too many requests", "quota exceeded"]
      auth: ["401", "unauthorized", "invalid api key", "not logged in"]

  dirac:
    binary: "dirac"
    auto_approve_flags: ["--auto-approve-all"]
    resume_mechanism: "cli_flag"
    resume_flag: "--taskId"
    resume_command: null
    export_command: null
    model_flag: "--model"
    interaction_model:
      type: "headless_iterative"
    system_prompt_mechanism:
      type: "none"
    error_patterns:
      rate_limit: ["rate limit", "re:\\b429\\b", "too many requests", "quota exceeded"]
      auth: ["401", "unauthorized", "invalid api key", "not logged in", "authentication failed"]
