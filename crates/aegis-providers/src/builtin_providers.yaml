providers:
  claude-code:
    binary: "claude"
    auto_approve_flags: ["--yolo"]
    non_interactive_flags: ["--non-interactive"]
    resume_mechanism: "cli_flag"
    resume_flag: "--resume"
    export_command: "/export"
    error_patterns:
      rate_limit: ["rate limit", "429", "usage limit reached"]
      auth: ["401", "authentication failed"]

  gemini-cli:
    binary: "gemini"
    auto_approve_flags: ["--yes"]
    non_interactive_flags: []
    resume_mechanism: "injection"
    resume_command: "/resume {session_id}"
    export_command: "/checkpoint save aegis-handoff"
    error_patterns:
      rate_limit: ["quota exceeded", "429"]
      auth: ["401", "permission denied"]

  codex:
    binary: "codex"
    auto_approve_flags: ["--full-auto"]
    non_interactive_flags: ["--no-alt-screen"]
    resume_mechanism: "subcommand"
    resume_command: "resume {session_id}"
    export_command: null
    error_patterns:
      rate_limit: ["rate limit", "429", "too many requests", "quota exceeded"]
      auth: ["401", "unauthorized", "invalid api key", "not logged in"]
