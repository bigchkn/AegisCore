providers:
  claude-code:
    binary: "claude"
    auto_approve_flags: ["--yolo"]
    non_interactive_flags: ["--non-interactive"]
    resume_flag: "--resume"
    error_patterns:
      rate_limit: ["rate limit", "429", "usage limit reached"]
      auth: ["401", "authentication failed"]

  gemini-cli:
    binary: "gemini"
    auto_approve_flags: ["--yes"]
    non_interactive_flags: []
    resume_command: "/resume {session_id}" # Injected via send-keys
    error_patterns:
      rate_limit: ["quota exceeded", "429"]
      auth: ["401", "permission denied"]

  codex:
    binary: "codex"
    auto_approve_flags: []
    non_interactive_flags: []
    error_patterns:
      rate_limit: ["rate limit", "429", "insufficient_quota"]
      auth: ["401", "incorrect api key"]

  ollama:
    binary: "ollama"
    auto_approve_flags: []
    non_interactive_flags: []
    error_patterns:
      rate_limit: [] # local
      auth: [] # no auth
